name: Bug Report
description: Something isn't working correctly
labels: ["bug", "triage"]
assignees: ["hamza-hafeez82"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill this out as completely as possible.

  - type: input
    id: version
    attributes:
      label: Cortex version
      description: Run `cortex --version` and paste the output
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `cortex scan ./myrepo`
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      render: shell
